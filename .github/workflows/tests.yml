name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run DoD-named tests
        run: |
          pytest -v \
            tests/test_catalog.py::test_catalog_returns_filtered_sorted_products \
            tests/test_catalog.py::test_facets_return_counts_per_filter_value \
            tests/test_catalog.py::test_invalid_sort_returns_400 \
            tests/test_catalog.py::test_b2b_unavailable_returns_502

      - name: Run full test suite
        run: pytest -v
